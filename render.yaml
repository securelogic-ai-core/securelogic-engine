services:
  - type: web
    name: securelogic-engine
    region: virginia
    env: node
    plan: starter
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run migrate && npm start
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production

      # Database — provision a Render Postgres instance or supply an external URL
      - key: DATABASE_URL
        sync: false

      # Redis — provision a Render Redis instance or supply an external URL
      - key: REDIS_URL
        sync: false

      # Admin access (min 16 chars; rotation: "key1,key2")
      - key: SECURELOGIC_ADMIN_KEY
        sync: false

      # IP allowlist for /admin routes (CIDR, comma-separated; 0.0.0.0/0 is forbidden)
      # On Render internal network, 10.0.0.0/8 covers private traffic.
      # Set this to match your actual ingress range before deploying.
      - key: SECURELOGIC_ADMIN_ALLOWED_IPS
        sync: false

      # Issue signing secret (min 16 chars; single value only — rotation not yet supported)
      - key: SECURELOGIC_SIGNING_SECRET
        sync: false

      # LemonSqueezy webhook secret (min 16 chars)
      - key: LEMON_WEBHOOK_SECRET
        sync: false

      # JWT signing secret — required for customer portal auth (HS256)
      - key: JWT_SECRET
        sync: false

      # ── Boot-critical (engine exits at boot without these) ──────────────
      # validateEnv.ts REQUIRED_ENV_PROD + validateFieldEncryptionKey(). These
      # were previously undeclared here and had to be remembered as
      # dashboard-only vars; declared now so render.yaml is a complete boot
      # contract for the engine service.

      # AES-256-GCM key — exactly 64 lowercase hex chars — encrypting sensitive
      # JSONB at rest (report_json, content_json, raw_payload). Required in prod.
      - key: FIELD_ENCRYPTION_KEY
        sync: false

      # HMAC secret (min 16 chars) signing one-click unsubscribe links.
      - key: UNSUBSCRIBE_SECRET
        sync: false

      # Verified Resend sender for outbound Intelligence Brief emails. Read by
      # briefEmailSender.ts (BRIEF_FROM_EMAIL). DISTINCT from
      # NEWSLETTER_FROM_EMAIL below, which is the transactional / recovery /
      # invite sender — both coexist and are set independently.
      - key: BRIEF_FROM_EMAIL
        sync: false

      # Base URL for CAN-SPAM unsubscribe links in Brief emails.
      - key: BRIEF_UNSUBSCRIBE_BASE_URL
        sync: false

      # Scheduler trigger secret (min 32 chars) — bearer token for
      # POST /api/admin/briefs/run-scheduler. Required at boot in production
      # per validateEnv.ts; engine refuses to start without it.
      - key: SCHEDULER_SECRET
        sync: false

      # TOTP secret encryption key — AES-256-GCM, encrypts TOTP secrets at rest.
      # Falls back to JWT_SECRET if not set.
      # Generate with: openssl rand -hex 32
      - key: MFA_SECRET_KEY
        sync: false

      # Base URL for unsubscribe links (e.g. https://app.example.com)
      - key: APP_BASE_URL
        sync: false

      # Engine's OWN public origin, used to build the SAML ACS URL the IdP posts
      # back to. Set each environment to its own engine URL so a staging SSO flow
      # uses the staging ACS endpoint. The code falls back to the production engine
      # when unset, so this MUST be set explicitly on the staging engine service.
      - key: ENGINE_URL_BASE
        sync: false

      # Stripe — optional; billing routes are disabled if not set
      - key: STRIPE_SECRET_KEY
        sync: false

      # Stripe webhook signing secret (from Stripe Dashboard > Webhooks)
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

      # Stripe Price IDs — one per paid tier
      - key: STRIPE_PRICE_ID_PROFESSIONAL
        sync: false

      - key: STRIPE_PRICE_ID_TEAMS
        sync: false

      - key: STRIPE_PRICE_ID_PLATFORM
        sync: false

      - key: STRIPE_PRICE_ID_PLATFORM_ANNUAL
        sync: false

      # URLs Stripe redirects to after checkout
      - key: STRIPE_SUCCESS_URL
        sync: false

      - key: STRIPE_CANCEL_URL
        sync: false

      # URL Stripe redirects to after the customer exits the billing portal
      - key: STRIPE_PORTAL_RETURN_URL
        sync: false

      # Stripe billing-portal configuration ID — selects the portal feature set
      # (which products/prices the customer can switch to). Read by the billing
      # portal route; without it the portal uses the Stripe account default.
      - key: STRIPE_PORTAL_CONFIGURATION_ID
        sync: false

      # Resend webhook signing secret (from Resend Dashboard > Webhooks)
      # Required: without this, bounce and complaint events return 401 and
      # are never recorded — suppression list will not auto-populate
      - key: RESEND_WEBHOOK_SECRET
        sync: false

      # Resend — used for account recovery emails (magic-link sign-in)
      # Optional: if not set, recovery requests are accepted but no email is sent
      - key: RESEND_API_KEY
        sync: false

      - key: NEWSLETTER_FROM_EMAIL
        sync: false

      # Webhook URL for worker failure alerts (e.g. Slack incoming webhook)
      - key: ALERT_WEBHOOK_URL
        sync: false

      # Required for voice transcription
      # (Whisper-1 via /api/ask/transcribe).
      # Without this key the voice button
      # returns a 503 and the user sees
      # "Could not transcribe audio."
      - key: OPENAI_API_KEY
        sync: false

      # Anthropic API key — LLM signal enrichment in the intelligence brief
      # generator (src/api/lib/intelligenceBriefGenerator.ts) and the LLM
      # control matcher (SECURELOGIC_LLM_CONTROL_MATCHER_ENABLED below, which
      # no-ops without this). Without it, brief items fall back to generic
      # template content via fallbackWhyItMatters()/fallbackRecommendedActions().
      - key: ANTHROPIC_API_KEY
        sync: false

      # Sentry error tracking (engine). DSN + environment label are set in the
      # Render dashboard, never in the repo. When SENTRY_DSN_ENGINE is unset the
      # engine boots normally with Sentry disabled. See docs/sentry-setup.md.
      - key: SENTRY_DSN_ENGINE
        sync: false

      - key: SENTRY_ENV
        sync: false

      # Dormant-engine enablement — PRODUCTION (operator-authorized 2026-06-24).
      # The "match → surface → what to do next" engine, live. All three are
      # read from process.env at signal-processing time; disable any one by
      # setting it to "false". The LLM control matcher spends Anthropic credits
      # per qualifying signal (Critical/High + relevant type, ≤80 controls,
      # ≤1024 out, after-commit) — ANTHROPIC_API_KEY must be set (dashboard) or
      # it no-ops; watch console balance.
      - key: SECURELOGIC_FUZZY_VENDOR_MATCH_ENABLED   # item 3 — suggest-only, free
        value: "true"
      - key: SECURELOGIC_ACTION_ENGINE_ENABLED        # item 1 — idempotent action writes, free
        value: "true"
      - key: SECURELOGIC_LLM_CONTROL_MATCHER_ENABLED  # item 2 — LLM suggest-only, PAID
        value: "true"

  # =========================================================
  # SECURELOGIC ENGINE — STAGING (web)
  # Tracks the develop branch. Mirrors the production engine
  # above; NODE_ENV stays "production" so all prod-conditional
  # safety checks remain active (Redis fail-closed, admin
  # rate-limit fail-closed, scheduler/encryption secret
  # enforcement, audit/retention assertions, validateEnv
  # required-env list).
  #
  # APP_ENV=staging is the labeling-only differentiator used
  # by the logger pino base to tell staging from prod in log
  # output. Every other env var must be set to staging
  # credentials in the dashboard.
  #
  # Keep this block in lockstep with securelogic-engine above.
  # =========================================================

  - type: web
    name: securelogic-engine-staging
    region: virginia
    env: node
    plan: starter
    branch: develop
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run migrate && node dist/api/server.js
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production

      # Labeling-only — distinguishes staging from prod in logs.
      # Prod leaves this unset (appEnv: null in pino base).
      - key: APP_ENV
        value: staging

      # Staging Postgres — populate with the securelogic_staging URL in dashboard
      - key: DATABASE_URL
        sync: false

      # Staging Redis — populate in dashboard
      - key: REDIS_URL
        sync: false

      - key: SECURELOGIC_ADMIN_KEY
        sync: false

      - key: SECURELOGIC_ADMIN_ALLOWED_IPS
        sync: false

      - key: SECURELOGIC_SIGNING_SECRET
        sync: false

      - key: LEMON_WEBHOOK_SECRET
        sync: false

      - key: JWT_SECRET
        sync: false

      # ── Boot-critical (engine exits at boot without these) ──────────────
      # Lockstep with the prod engine block. validateEnv.ts REQUIRED_ENV_PROD +
      # validateFieldEncryptionKey() (NODE_ENV stays "production" on staging, so
      # every prod boot gate applies here too).
      - key: FIELD_ENCRYPTION_KEY
        sync: false

      - key: UNSUBSCRIBE_SECRET
        sync: false

      # BRIEF_FROM_EMAIL: verified Resend sender for Intelligence Brief emails
      # (briefEmailSender.ts). Distinct from NEWSLETTER_FROM_EMAIL below.
      - key: BRIEF_FROM_EMAIL
        sync: false

      - key: BRIEF_UNSUBSCRIBE_BASE_URL
        sync: false

      - key: SCHEDULER_SECRET
        sync: false

      - key: MFA_SECRET_KEY
        sync: false

      - key: APP_BASE_URL
        sync: false

      # Engine's OWN public origin, used to build the SAML ACS URL the IdP posts
      # back to. Set each environment to its own engine URL so a staging SSO flow
      # uses the staging ACS endpoint. The code falls back to the production engine
      # when unset, so this MUST be set explicitly on the staging engine service.
      - key: ENGINE_URL_BASE
        sync: false

      - key: STRIPE_SECRET_KEY
        sync: false

      - key: STRIPE_WEBHOOK_SECRET
        sync: false

      - key: STRIPE_PRICE_ID_PROFESSIONAL
        sync: false

      - key: STRIPE_PRICE_ID_TEAMS
        sync: false

      - key: STRIPE_PRICE_ID_PLATFORM
        sync: false

      - key: STRIPE_PRICE_ID_PLATFORM_ANNUAL
        sync: false

      - key: STRIPE_SUCCESS_URL
        sync: false

      - key: STRIPE_CANCEL_URL
        sync: false

      - key: STRIPE_PORTAL_RETURN_URL
        sync: false

      - key: STRIPE_PORTAL_CONFIGURATION_ID
        sync: false

      - key: RESEND_WEBHOOK_SECRET
        sync: false

      - key: RESEND_API_KEY
        sync: false

      - key: NEWSLETTER_FROM_EMAIL
        sync: false

      # Webhook URL for worker failure alerts (e.g. Slack incoming webhook)
      - key: ALERT_WEBHOOK_URL
        sync: false

      - key: OPENAI_API_KEY
        sync: false

      # Anthropic API key — required for LLM signal enrichment in the
      # intelligence brief generator (src/api/lib/intelligenceBriefGenerator.ts).
      # Without this, every brief item falls back to generic template content
      # via fallbackWhyItMatters() and fallbackRecommendedActions().
      - key: ANTHROPIC_API_KEY
        sync: false

      # Cloudflare R2 — STAGING ONLY. Vendor-assurance-intelligence Phase 0
      # ships the blob primitive against R2; production engine is intentionally
      # left unconfigured in this package. Populate R2_* in the staging
      # dashboard before running scripts/blob-storage-smoke.ts.
      # Per TENANT_ISOLATION_STANDARD.md §5: every object key MUST be prefixed
      # with org/{organizationId}/; pre-signed URLs are single-org and clamped
      # to <=120s TTL by src/api/lib/blobStorage.ts.
      - key: R2_ACCOUNT_ID
        sync: false

      - key: R2_ACCESS_KEY_ID
        sync: false

      - key: R2_SECRET_ACCESS_KEY
        sync: false

      - key: R2_BUCKET
        sync: false

      - key: R2_ENDPOINT
        sync: false

      # Vendor-Assurance Intelligence (Phase 1) — STAGING ONLY.
      # Routes 404 unless this is set to 'true'. Production engine block does
      # not receive this var; production enablement is a future package decision.
      - key: SECURELOGIC_VENDOR_ASSURANCE_ENABLED
        value: "true"

      # Dormant-engine enablement — STAGING (lockstep with the prod engine block).
      # All three signal-engine capabilities on; disable any by setting "false".
      - key: SECURELOGIC_FUZZY_VENDOR_MATCH_ENABLED   # item 3 — suggest-only, free
        value: "true"
      - key: SECURELOGIC_ACTION_ENGINE_ENABLED        # item 1 — idempotent action writes, free
        value: "true"
      - key: SECURELOGIC_LLM_CONTROL_MATCHER_ENABLED  # item 2 — LLM suggest-only, PAID
        value: "true"

      # Sentry error tracking (engine — staging). Kept in lockstep with the
      # production engine block above; set SENTRY_ENV=staging in the dashboard.
      # See docs/sentry-setup.md.
      - key: SENTRY_DSN_ENGINE
        sync: false

      - key: SENTRY_ENV
        sync: false

  # =========================================================
  # INTELLIGENCE WORKER (background)
  # Long-running process — runs the signal pipeline every hour.
  # Uses the same Postgres instance as the API service.
  #
  # Keep both worker definitions in lockstep; staging mirrors
  # prod env-vars except where listed.
  # =========================================================

  - type: worker
    name: securelogic-intelligence-worker
    region: virginia
    env: node
    plan: starter
    buildCommand: npm ci --include=dev && tsc -p services/intelligence-worker/tsconfig.json
    startCommand: node dist-intelligence-worker/services/intelligence-worker/src/scheduler.js
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production

      # Shared with API service — same Postgres instance
      - key: DATABASE_URL
        sync: false

      # Shared with API service — same Redis instance.
      # Required for the 15-minute KEV poll's ETag short-circuit
      # (kevPoller.ts → fetchCisaKevSignals → feedEtagStore).
      # Without this, every poll fetches the full catalog instead of 304.
      - key: REDIS_URL
        sync: false

      # Email delivery for newsletter sends
      - key: RESEND_API_KEY
        sync: false

      - key: NEWSLETTER_FROM_EMAIL
        sync: false

      # Public URL embedded in newsletter HTML links (read-online,
      # unsubscribe). Referenced by sendNewsletter.ts and
      # renderNewsletterHtml.ts. Distinct from APP_BASE_URL.
      - key: NEWSLETTER_APP_URL
        sync: false

      # Worker failure alerts (e.g. Slack incoming webhook)
      - key: ALERT_WEBHOOK_URL
        sync: false

      # Must match the main API service value — used to sign unsubscribe tokens
      # that the main API verifies at GET /unsubscribe
      - key: UNSUBSCRIBE_SECRET
        sync: false

      # Base URL of the main API (e.g. https://app.example.com) — used to build
      # unsubscribe links appended to outbound newsletter emails
      - key: APP_BASE_URL
        sync: false

      # Engine's OWN public origin, used to build the SAML ACS URL the IdP posts
      # back to. Set each environment to its own engine URL so a staging SSO flow
      # uses the staging ACS endpoint. The code falls back to the production engine
      # when unset, so this MUST be set explicitly on the staging engine service.
      - key: ENGINE_URL_BASE
        sync: false

      # Anthropic API key — required for LLM signal enrichment, executive synthesis,
      # thesis headline, cross-domain analysis, and action summary generation.
      # Without this, all briefs fall back to generic template content.
      - key: ANTHROPIC_API_KEY
        sync: false

      # Optional: override log verbosity (default: info)
      - key: LOG_LEVEL
        sync: false

      # Dormant-engine enablement — PRODUCTION worker (the main signal-ingestion
      # volume; operator-authorized 2026-06-24). All three on; the LLM matcher
      # uses this block's ANTHROPIC_API_KEY. Disable any by setting "false".
      - key: SECURELOGIC_FUZZY_VENDOR_MATCH_ENABLED   # item 3 — suggest-only, free
        value: "true"
      - key: SECURELOGIC_ACTION_ENGINE_ENABLED        # item 1 — idempotent action writes, free
        value: "true"
      - key: SECURELOGIC_LLM_CONTROL_MATCHER_ENABLED  # item 2 — LLM suggest-only, PAID
        value: "true"

  # =========================================================
  # INTELLIGENCE WORKER — STAGING (background)
  # Tracks the develop branch. Mirrors the production worker
  # above; NODE_ENV is staging and dashboard values point at
  # the staging Postgres / Resend / Anthropic credentials.
  # Keep this block in lockstep with securelogic-intelligence-worker.
  # =========================================================

  - type: worker
    name: securelogic-intelligence-worker-staging
    region: virginia
    env: node
    plan: starter
    branch: develop
    buildCommand: npm ci --include=dev && tsc -p services/intelligence-worker/tsconfig.json
    startCommand: node dist-intelligence-worker/services/intelligence-worker/src/scheduler.js
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: staging

      # Staging Postgres — populate with the securelogic_staging URL in dashboard
      - key: DATABASE_URL
        sync: false

      # Staging Redis — populate with the staging Redis URL in dashboard.
      # Required for the 15-minute KEV poll's ETag short-circuit
      # (kevPoller.ts → fetchCisaKevSignals → feedEtagStore).
      # Without this, every poll fetches the full catalog instead of 304.
      - key: REDIS_URL
        sync: false

      # Email delivery for newsletter sends — staging Resend key recommended
      - key: RESEND_API_KEY
        sync: false

      - key: NEWSLETTER_FROM_EMAIL
        sync: false

      # Public URL embedded in newsletter HTML links (read-online,
      # unsubscribe). Distinct from APP_BASE_URL.
      - key: NEWSLETTER_APP_URL
        sync: false

      # Worker failure alerts. Recommend a separate staging channel
      # so staging noise doesn't reach the production alert channel.
      - key: ALERT_WEBHOOK_URL
        sync: false

      # Must match the staging API service value — used to sign unsubscribe tokens
      # that the staging API verifies at GET /unsubscribe
      - key: UNSUBSCRIBE_SECRET
        sync: false

      # Base URL of the staging API — used to build unsubscribe links
      # appended to outbound newsletter emails
      - key: APP_BASE_URL
        sync: false

      # Engine's OWN public origin, used to build the SAML ACS URL the IdP posts
      # back to. Set each environment to its own engine URL so a staging SSO flow
      # uses the staging ACS endpoint. The code falls back to the production engine
      # when unset, so this MUST be set explicitly on the staging engine service.
      - key: ENGINE_URL_BASE
        sync: false

      # Consumed by the LLM control matcher (PR #345) on the signal-ingestion
      # fan-out when SECURELOGIC_LLM_CONTROL_MATCHER_ENABLED=true. Must be set in
      # the dashboard or the matcher no-ops (llm_unavailable).
      - key: ANTHROPIC_API_KEY
        sync: false

      # Optional: override log verbosity (default: info)
      - key: LOG_LEVEL
        sync: false

      # Dormant-engine enablement — STAGING worker (lockstep with prod worker).
      # All three on; disable any by setting "false".
      - key: SECURELOGIC_FUZZY_VENDOR_MATCH_ENABLED   # item 3 — suggest-only, free
        value: "true"
      - key: SECURELOGIC_ACTION_ENGINE_ENABLED        # item 1 — idempotent action writes, free
        value: "true"
      - key: SECURELOGIC_LLM_CONTROL_MATCHER_ENABLED  # item 2 — LLM suggest-only, PAID
        value: "true"

  # =========================================================
  # POSTURE WORKER (background)
  # Long-running process — computes posture snapshots for all
  # active organisations every 6 hours. Uses the same Postgres
  # instance as the API service.
  # =========================================================

  - type: worker
    name: securelogic-posture-worker
    region: oregon
    env: node
    plan: starter
    buildCommand: npm ci --include=dev && tsc -p services/posture-worker/tsconfig.json
    startCommand: node dist-posture-worker/services/posture-worker/src/index.js
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production

      # Shared with API service — same Postgres instance
      - key: DATABASE_URL
        sync: false

      # Optional: override log verbosity (default: info)
      - key: LOG_LEVEL
        sync: false

  # =========================================================
  # POSTURE WORKER — STAGING (background)
  # Tracks the develop branch. Mirrors the production posture
  # worker above; NODE_ENV is staging and DATABASE_URL points
  # at the staging Postgres in the dashboard.
  #
  # Computes a posture snapshot for every active org immediately
  # on boot, then every 6 hours — so a deploy to develop yields
  # an immediate staging cycle for verification, not a 6h wait.
  #
  # Keep this block in lockstep with securelogic-posture-worker.
  # =========================================================

  - type: worker
    name: securelogic-posture-worker-staging
    region: virginia
    env: node
    plan: starter
    branch: develop
    buildCommand: npm ci --include=dev && tsc -p services/posture-worker/tsconfig.json
    startCommand: node dist-posture-worker/services/posture-worker/src/index.js
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: staging

      # Staging Postgres — populate with the securelogic_staging URL in the
      # dashboard. Same instance engine-staging and intelligence-worker-staging
      # use. TLS is on by default (src/api/infra/postgres.ts:19-23 — only
      # DATABASE_SSL_DISABLED=true turns it off); no PGSSL needed.
      - key: DATABASE_URL
        sync: false

      # Optional: override log verbosity (default: info)
      - key: LOG_LEVEL
        sync: false

  # =========================================================
  # DATA-RIGHTS WORKER (background)
  # GDPR/CCPA data-subject-rights job runner (O-10). EXPORT-ONLY:
  # claims data_export_self / data_export_org jobs from the `jobs`
  # table, runs runExport, streams the bundle to R2. Deletion-reap
  # and export-purge jobs are out of scope and left unclaimed.
  #
  # Cross-org claim poll uses the elevated channel; per-job work
  # (execution + terminal writes) runs inside withTenant(orgId).
  # Polls every 15s, single-flight, drains SIGTERM. Workers do NOT
  # auto-migrate — the engine startCommand owns migrations.
  #
  # PROD R2 NOTE: production R2 is intentionally unconfigured today
  # (see the engine block — Phase 0 shipped R2 to staging only).
  # This worker is INERT in prod until R2_* is populated AND the
  # data-rights intake (PR #5) begins enqueuing jobs. Declared here
  # so the IaC is complete and the flip-set (docs/A04-G1-rls-rollout
  # -plan.md §4a) records it as a DATABASE_URL holder.
  #
  # Keep this block in lockstep with the staging twin below.
  # =========================================================

  - type: worker
    name: securelogic-data-rights-worker
    region: oregon
    env: node
    plan: starter
    buildCommand: npm ci --include=dev && tsc -p services/data-rights-worker/tsconfig.json
    startCommand: node dist-data-rights-worker/services/data-rights-worker/src/index.js
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production

      # Shared with API service — same Postgres instance. At the A04-G1 flip
      # this becomes the app_request channel and a MIGRATION_DATABASE_URL
      # (owner) is added for the cross-org claim poll (pgElevated). See
      # docs/A04-G1-rls-rollout-plan.md §4a (6th flip-set holder).
      - key: DATABASE_URL
        sync: false

      # Cloudflare R2 — destination for export bundles
      # (org/{orgId}/data-exports/{exportId}.zip). Populate in the dashboard;
      # prod enablement is a pending platform decision (see PROD R2 NOTE).
      - key: R2_ACCOUNT_ID
        sync: false

      - key: R2_ACCESS_KEY_ID
        sync: false

      - key: R2_SECRET_ACCESS_KEY
        sync: false

      - key: R2_BUCKET
        sync: false

      - key: R2_ENDPOINT
        sync: false

      # Optional: override log verbosity (default: info)
      - key: LOG_LEVEL
        sync: false

  # =========================================================
  # DATA-RIGHTS WORKER — STAGING (background)
  # Tracks the develop branch. Mirrors the production data-rights
  # worker above; NODE_ENV is staging, DATABASE_URL + R2_* point at
  # the staging Postgres / R2 in the dashboard. This is where export
  # job execution is validated before prod (R2 is configured here).
  #
  # Keep this block in lockstep with securelogic-data-rights-worker.
  # =========================================================

  - type: worker
    name: securelogic-data-rights-worker-staging
    region: virginia
    env: node
    plan: starter
    branch: develop
    buildCommand: npm ci --include=dev && tsc -p services/data-rights-worker/tsconfig.json
    startCommand: node dist-data-rights-worker/services/data-rights-worker/src/index.js
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: staging

      # Staging Postgres — same instance engine-staging, intelligence-worker-
      # staging and posture-worker-staging use. TLS on by default; no PGSSL.
      - key: DATABASE_URL
        sync: false

      # Cloudflare R2 — STAGING. Same bucket the engine-staging block uses for
      # vendor-assurance blobs; export bundles land under data-exports/.
      - key: R2_ACCOUNT_ID
        sync: false

      - key: R2_ACCESS_KEY_ID
        sync: false

      - key: R2_SECRET_ACCESS_KEY
        sync: false

      - key: R2_BUCKET
        sync: false

      - key: R2_ENDPOINT
        sync: false

      # Optional: override log verbosity (default: info)
      - key: LOG_LEVEL
        sync: false

  # =========================================================
  # VENDOR-EXTRACTION WORKER (background)
  # Durable SOC-extraction worker (Pillar 1). Claims
  # vendor_assurance_extract jobs from the generic `jobs` table
  # (UPDATE … FOR UPDATE SKIP LOCKED, 15-min visibility-timeout
  # reclaim) and runs the Claude extraction pipeline out-of-process,
  # so an engine redeploy can no longer strand an in-flight extraction.
  # Mirrors securelogic-data-rights-worker; single serial instance,
  # SIGTERM drain. Workers do NOT auto-migrate — the engine web
  # startCommand owns migrations.
  #
  # REGION: virginia — pinned to where the prod Postgres lives (the prod
  # engine web block is virginia and migrates the prod DB). This follows
  # the region-pin rule (pin the worker to its DB's region). It does NOT
  # match the data-rights-worker / posture-worker prod blocks, which run
  # oregon and are therefore cross-region against the virginia prod DB —
  # a known pre-existing divergence, not a template. Do NOT "correct"
  # this block to oregon.
  #
  # ANTHROPIC_API_KEY lives on THIS worker only (spec §C.2) — it does the
  # Claude extraction work and is intentionally absent from the engine
  # web blocks. Keep this block in lockstep with the staging twin below.
  # =========================================================

  - type: worker
    name: securelogic-vendor-extraction-worker
    region: virginia
    env: node
    plan: starter
    buildCommand: npm ci --include=dev && tsc -p services/vendor-extraction-worker/tsconfig.json
    startCommand: node dist-vendor-extraction-worker/services/vendor-extraction-worker/src/index.js
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production

      # Shared with API service — same (virginia) Postgres instance.
      - key: DATABASE_URL
        sync: false

      # Cloudflare R2 — source of the uploaded SOC PDFs the worker
      # extracts (org/{orgId}/vendor-assurance/...). Populate in the
      # dashboard; prod enablement is a separate Part-2 decision.
      - key: R2_ACCOUNT_ID
        sync: false

      - key: R2_ACCESS_KEY_ID
        sync: false

      - key: R2_SECRET_ACCESS_KEY
        sync: false

      - key: R2_BUCKET
        sync: false

      - key: R2_ENDPOINT
        sync: false

      # Anthropic API key — required for SOC extraction (Claude). Lives on
      # the worker ONLY (spec §C.2), never on an engine web block.
      - key: ANTHROPIC_API_KEY
        sync: false

      # Optional: override log verbosity (default: info)
      - key: LOG_LEVEL
        sync: false

  # =========================================================
  # VENDOR-EXTRACTION WORKER — STAGING (background)
  # Tracks the develop branch. Mirrors the production worker above;
  # NODE_ENV is staging, and DATABASE_URL + R2_* + ANTHROPIC_API_KEY
  # point at the staging Postgres / R2 / Anthropic credentials in the
  # dashboard. This is where SOC extraction is validated end-to-end
  # (upload → extract → CUEC map → export) before prod.
  #
  # Keep this block in lockstep with securelogic-vendor-extraction-worker.
  # =========================================================

  - type: worker
    name: securelogic-vendor-extraction-worker-staging
    region: virginia
    env: node
    plan: starter
    branch: develop
    buildCommand: npm ci --include=dev && tsc -p services/vendor-extraction-worker/tsconfig.json
    startCommand: node dist-vendor-extraction-worker/services/vendor-extraction-worker/src/index.js
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: staging

      # Staging Postgres — same instance engine-staging and the other
      # staging workers use. TLS on by default; no PGSSL.
      - key: DATABASE_URL
        sync: false

      # Cloudflare R2 — STAGING. Same bucket engine-staging uses for
      # vendor-assurance blobs.
      - key: R2_ACCOUNT_ID
        sync: false

      - key: R2_ACCESS_KEY_ID
        sync: false

      - key: R2_SECRET_ACCESS_KEY
        sync: false

      - key: R2_BUCKET
        sync: false

      - key: R2_ENDPOINT
        sync: false

      # Anthropic API key — staging credential. Worker-only (spec §C.2).
      - key: ANTHROPIC_API_KEY
        sync: false

      # Optional: override log verbosity (default: info)
      - key: LOG_LEVEL
        sync: false

  # =========================================================
  # SECURELOGIC APP (Next.js frontend)
  # User-facing web application: landing, registration, login,
  # brief archive, account, and billing flows.
  # Calls the engine API server-side; never exposes secrets
  # or API keys to the browser.
  # =========================================================

  - type: web
    name: securelogic-app
    region: oregon
    env: node
    plan: starter
    buildCommand: cd app && npm ci --include=dev && rm -rf .next && npm run build
    startCommand: cd app && npx next start -p $PORT
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production

      # Internal URL of the securelogic-engine service on Render.
      # Use the private service URL (e.g. https://securelogic-engine.onrender.com)
      # so traffic stays within the Render network.
      - key: ENGINE_API_URL
        sync: false

      # Public URL of the securelogic-engine service, bundled into the
      # browser for SSO check-domain and SSO login redirects.
      # Must be the public Render URL (reachable from end-user browsers).
      - key: NEXT_PUBLIC_ENGINE_URL
        sync: false

      # Secret used to encrypt the iron-session cookie.
      # Must be at least 32 characters. Generate with: openssl rand -hex 32
      - key: SESSION_SECRET
        sync: false

      # Absolute session lifetime in seconds. Default: 28800 (8 hours).
      # Set lower for higher-security deployments.
      - key: SESSION_TIMEOUT_SECONDS
        sync: false

      # Sentry error tracking (app). Values set in the Render dashboard.
      # SENTRY_DSN_APP is server-only; NEXT_PUBLIC_SENTRY_DSN_APP is inlined
      # into the browser bundle at build time (must be present at build to be
      # picked up). NEXT_PUBLIC_SENTRY_ENV labels the environment. All optional
      # — when unset the app builds and runs with Sentry disabled.
      # See docs/sentry-setup.md.
      - key: SENTRY_DSN_APP
        sync: false

      - key: NEXT_PUBLIC_SENTRY_DSN_APP
        sync: false

      - key: NEXT_PUBLIC_SENTRY_ENV
        sync: false

  # =========================================================
  # SECURELOGIC WEBSITE (Next.js marketing site)
  # Public-facing marketing site: homepage, platform, pricing,
  # Intelligence Brief product page.
  # Links to the app service for login and registration.
  # =========================================================

  - type: web
    name: securelogic-website
    region: oregon
    env: node
    plan: starter
    buildCommand: cd website && npm ci --include=dev && npm run build
    startCommand: cd website && npx serve@latest out -l $PORT
    autoDeploy: true
    # Public marketing domain. Next.js on Render is the production site
    # (the legacy WordPress host is being retired). The apex and www both
    # serve this service. NOTE: declaring domains here records intent in IaC;
    # the custom domain must still be added in the Render dashboard and the
    # DNS records pointed at Render's targets at the registrar.
    domains:
      - securelogicai.com
      - www.securelogicai.com
    envVars:
      - key: NODE_ENV
        value: production

      # Public URL of the securelogic-app service.
      # Used by the Nav and Footer to build login/register CTAs.
      # e.g. https://app.securelogicai.com
      - key: NEXT_PUBLIC_APP_URL
        sync: false

      # Canonical public URL of THIS marketing site, used for metadataBase /
      # canonical tags / OG / sitemap. Set each environment to its OWN site URL so
      # the staging build never emits production canonical/OG metadata.
      # Prod: https://www.securelogicai.com · Staging: the staging Render URL.
      - key: NEXT_PUBLIC_SITE_URL
        sync: false

      # Public origin of the SecureLogic engine API that the Brief signup form
      # POSTs to. Set each environment to its OWN API origin so a staging build
      # never posts subscriber emails to the production API.
      # Prod: https://api.securelogicai.com · Staging: the staging engine URL.
      - key: NEXT_PUBLIC_API_URL
        sync: false

  # Staging mirror of securelogic-website — tracks develop so the rebuilt
  # marketing site can be previewed before it is promoted to main. No custom
  # domains: it stays on its Render-assigned URL
  # (securelogic-website-staging.onrender.com).
  - type: web
    name: securelogic-website-staging
    region: oregon
    env: node
    plan: starter
    branch: develop
    buildCommand: cd website && npm ci --include=dev && npm run build
    startCommand: cd website && npx serve@latest out -l $PORT
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production

      # Public URL of the securelogic-app service.
      # Used by the Nav and Footer to build login/register CTAs.
      # e.g. https://app.securelogicai.com
      - key: NEXT_PUBLIC_APP_URL
        sync: false

      # Canonical public URL of THIS marketing site, used for metadataBase /
      # canonical tags / OG / sitemap. Set each environment to its OWN site URL so
      # the staging build never emits production canonical/OG metadata.
      # Prod: https://www.securelogicai.com · Staging: the staging Render URL.
      - key: NEXT_PUBLIC_SITE_URL
        sync: false

      # Public origin of the SecureLogic engine API that the Brief signup form
      # POSTs to. Set each environment to its OWN API origin so a staging build
      # never posts subscriber emails to the production API.
      # Prod: https://api.securelogicai.com · Staging: the staging engine URL.
      - key: NEXT_PUBLIC_API_URL
        sync: false
