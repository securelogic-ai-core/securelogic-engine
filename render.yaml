services:
  - type: web
    name: securelogic-engine
    env: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run migrate && npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production

      # Database — provision a Render Postgres instance or supply an external URL
      - key: DATABASE_URL
        sync: false

      # Redis — provision a Render Redis instance or supply an external URL
      - key: REDIS_URL
        sync: false

      # Admin access (min 16 chars; rotation: "key1,key2")
      - key: SECURELOGIC_ADMIN_KEY
        sync: false

      # IP allowlist for /admin routes (CIDR, comma-separated; 0.0.0.0/0 is forbidden)
      # On Render internal network, 10.0.0.0/8 covers private traffic.
      # Set this to match your actual ingress range before deploying.
      - key: SECURELOGIC_ADMIN_ALLOWED_IPS
        sync: false

      # Issue signing secret (min 16 chars; single value only — rotation not yet supported)
      - key: SECURELOGIC_SIGNING_SECRET
        sync: false

      # LemonSqueezy webhook secret (min 16 chars)
      - key: LEMON_WEBHOOK_SECRET
        sync: false

      # Session secret — must be set; defaults to "dev-secret" if omitted
      - key: SESSION_SECRET
        sync: false

      # Base URL for unsubscribe links (e.g. https://app.example.com)
      - key: APP_BASE_URL
        sync: false

      # Stripe — optional; billing routes are disabled if not set
      - key: STRIPE_SECRET_KEY
        sync: false

      # Stripe webhook signing secret (from Stripe Dashboard > Webhooks)
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

      # Stripe Price ID for the subscription plan
      - key: STRIPE_PRICE_ID
        sync: false

      # URLs Stripe redirects to after checkout
      - key: STRIPE_SUCCESS_URL
        sync: false

      - key: STRIPE_CANCEL_URL
        sync: false

      # URL Stripe redirects to after the customer exits the billing portal
      - key: STRIPE_PORTAL_RETURN_URL
        sync: false

      # Webhook URL for worker failure alerts (e.g. Slack incoming webhook)
      - key: ALERT_WEBHOOK_URL
        sync: false

  # =========================================================
  # INTELLIGENCE WORKER (background)
  # Long-running process — runs the signal pipeline every hour.
  # Uses the same Postgres and Redis instances as the API service.
  # =========================================================

  - type: worker
    name: securelogic-intelligence-worker
    env: node
    plan: starter
    buildCommand: npm install && tsc -p services/intelligence-worker/tsconfig.json
    startCommand: node dist-intelligence-worker/services/intelligence-worker/src/scheduler.js
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production

      # Shared with API service — same Postgres instance
      - key: DATABASE_URL
        sync: false

      # Shared with API service — same Redis instance
      - key: REDIS_URL
        sync: false

      # Email delivery for newsletter sends
      - key: RESEND_API_KEY
        sync: false

      - key: NEWSLETTER_FROM_EMAIL
        sync: false

      # Worker failure alerts (e.g. Slack incoming webhook)
      - key: ALERT_WEBHOOK_URL
        sync: false

      # Must match the main API service value — used to sign unsubscribe tokens
      # that the main API verifies at GET /unsubscribe
      - key: UNSUBSCRIBE_SECRET
        sync: false

      # Base URL of the main API (e.g. https://app.example.com) — used to build
      # unsubscribe links appended to outbound newsletter emails
      - key: APP_BASE_URL
        sync: false

      # Optional: override log verbosity (default: info)
      - key: LOG_LEVEL
        sync: false
