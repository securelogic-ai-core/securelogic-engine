name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

# Cancel superseded runs on the same branch to save Actions minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci
      - run: npm run lint

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci
      - run: npm test

  audit:
    name: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci
      - run: npm run build

  # E1-G1 cross-org tenant-isolation harness. Deliberately a SEPARATE job from
  # `test` so the unit run stays database-free — only this job provisions
  # Postgres. The harness drives the real app over a throwaway database;
  # testDb.ts drops/recreates the schema each run.
  cross-org-isolation:
    name: cross-org-isolation
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: harness
          POSTGRES_PASSWORD: harness
          POSTGRES_DB: harness
        ports:
          - 5432:5432
        # Hold the job until Postgres accepts connections.
        options: >-
          --health-cmd "pg_isready -U harness -d harness"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Shape matches test/isolation/testDb.ts and scripts/harness-db-up.sh:
      # non-TLS (testDb.ts connects with ssl:false) and no staging/prod
      # substring (testDb.ts refuses such URLs as a safety guard).
      TEST_DATABASE_URL: postgresql://harness:harness@127.0.0.1:5432/harness
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci
      - run: npm run test:isolation

  # A04-G1 tenant-coverage census. WARN-ONLY in phase 1: the script emits
  # warning annotations and always exits 0, so this job never blocks a merge and
  # is intentionally NOT in the main ruleset's required-checks list. Pure bash
  # (grep) — no npm install needed. Phase 4 escalates the rogue-pool section to
  # a hard failure and promotes this job to required.
  tenant-coverage:
    name: tenant-coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: bash scripts/check-tenant-coverage.sh
